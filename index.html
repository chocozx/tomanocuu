<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chokito Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
}

/* Banner */
.hero {
  background: url('https://via.placeholder.com/1200x400?text=Chokito+Store') center/cover no-repeat;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 10px;
}

/* Cards */
.card {
  border: none;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGEM COMPLETA */
.card img {
  width: 100%;
  height: 250px;
  object-fit: contain;
  background: #fff;
  padding: 10px;
}

/* Botões */
.btn-success {
  width: 100%;
  border-radius: 10px;
}

/* Carrinho */
#carrinho-box {
  position: fixed;
  top: 80px;
  right: 20px;
  width: 260px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Footer */
footer {
  margin-top: 50px;
  padding: 20px;
  background: #f8f9fa;
  text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">🧢 Chokito Store</a>
</div>
</nav>

<!-- HERO -->

<section class="hero">
<div>
<h1>Os melhores bonés do Brasil</h1>
<p>Estilo, conforto e qualidade</p>
</div>
</section>

<!-- PRODUTOS -->

<section class="container mt-5">
<h2 class="text-center mb-4">Destaques</h2>

<div class="row">

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200?text=Bone+Branco">
<div class="card-body text-center">
<h5>Lacoste Sport Branco</h5>
<p>R$ 50,00</p>
<button class="btn btn-success" onclick="comprar('Lacoste Sport Branco', 50)">
Comprar
</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200?text=Bone+Preto">
<div class="card-body text-center">
<h5>Don Juan Lacoste</h5>
<p>R$ 60,00</p>
<button class="btn btn-success" onclick="comprar('Don Juan Lacoste', 60)">
Comprar
</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300x200?text=Bone+Azul">
<div class="card-body text-center">
<h5>Boné Crochê</h5>
<p>R$ 70,00</p>
<button class="btn btn-success" onclick="comprar('Boné Crochê', 70)">
Comprar
</button>
</div>
</div>
</div>

</div>
</section>

<!-- CARRINHO -->

<div id="carrinho-box">
<h5>🛒 Carrinho</h5>
<div id="lista-carrinho"></div>
<p id="total">Total: R$ 0.00</p>
<button class="btn btn-primary w-100" onclick="finalizar()">Finalizar</button>
</div>

<!-- FOOTER -->

<footer>
<p>© 2026 Chokito Store</p>
</footer>

<script>
let carrinho = [];

// Adicionar produto
function comprar(nome, preco) {
  carrinho.push({ nome, preco });
  atualizarCarrinho();
}

// Atualizar carrinho
function atualizarCarrinho() {
  const lista = document.getElementById("lista-carrinho");
  const total = document.getElementById("total");

  lista.innerHTML = "";
  let soma = 0;

  carrinho.forEach((item, index) => {
    soma += item.preco;

    lista.innerHTML += `
      <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
        <span>${item.nome}</span>
        <button onclick="remover(${index})">❌</button>
      </div>
    `;
  });

  total.innerText = "Total: R$ " + soma.toFixed(2);
}

// Remover item
function remover(index) {
  carrinho.splice(index, 1);
  atualizarCarrinho();
}

// Finalizar compra
function finalizar() {
  if (carrinho.length === 0) {
    alert("Carrinho vazio!");
    return;
  }

  alert("Compra finalizada!");
  carrinho = [];
  atualizarCarrinho();
}
</script>

</body>
</html>
