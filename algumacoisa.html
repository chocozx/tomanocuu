<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Bonés</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
}

.card {
  margin: 20px;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}
</style>

</head>

<body>

<header>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
<div class="container-fluid">

<a class="navbar-brand" href="#">Bonés</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarSupportedContent">

<ul class="navbar-nav me-auto mb-2 mb-lg-0">
<li class="nav-item">
<a class="nav-link active" href="#">Início</a>
</li>
<li class="nav-item">
<a class="nav-link" href="#">Produtos</a>
</li>
<li class="nav-item">
<a class="nav-link" href="#">Contato</a>
</li>
</ul>

<input class="form-control me-2" type="search" placeholder="Buscar" id="buscar">
<button class="btn btn-outline-success" onclick="buscarProdutos()">Buscar</button>

<button class="btn btn-primary ms-2" onclick="abrirCarrinho()">
Carrinho (<span id="quantidadeCarrinho">0</span>)
</button>

</div>
</div>
</nav>
</header>

<main class="container mt-5">
<h1 class="text-center">Bonés</h1>
<div class="row" id="produtos"></div>
</main>

<!-- Modal Carrinho -->
<div class="modal fade" id="modalCarrinho" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Carrinho</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="modalCarrinhoBody"></div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
<button class="btn btn-success" onclick="finalizarCompra()">Finalizar Compra</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// PRODUTOS (agora direto no código)
let produtos = [
  { id: 1, nome: "Boné Preto", preco: 50.00, imagem: "https://via.placeholder.com/300x200?text=Bone+Preto" },
  { id: 2, nome: "Boné Branco", preco: 60.00, imagem: "https://via.placeholder.com/300x200?text=Bone+Branco" },
  { id: 3, nome: "Boné Azul", preco: 70.00, imagem: "https://via.placeholder.com/300x200?text=Bone+Azul" }
];

let carrinho = [];

// Mostrar produtos
function gerarProdutos() {
  const produtosDiv = document.getElementById('produtos');
  produtosDiv.innerHTML = '';

  produtos.forEach(produto => {
    produtosDiv.innerHTML += `
      <div class="col-md-4">
        <div class="card">
          <img src="${produto.imagem}">
          <div class="card-body">
            <h5>${produto.nome}</h5>
            <p>R$ ${produto.preco}</p>
            <button class="btn btn-primary" onclick="adicionarAoCarrinho(${produto.id})">
              Comprar
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

// Adicionar ao carrinho
function adicionarAoCarrinho(id) {
  const produto = produtos.find(p => p.id === id);
  carrinho.push(produto);
  atualizarCarrinho();
}

// Atualizar contador
function atualizarCarrinho() {
  document.getElementById('quantidadeCarrinho').innerText = carrinho.length;
}

// Abrir carrinho
function abrirCarrinho() {
  const modalBody = document.getElementById('modalCarrinhoBody');
  modalBody.innerHTML = '';

  if (carrinho.length === 0) {
    modalBody.innerHTML = "<p>Carrinho vazio</p>";
  } else {
    carrinho.forEach(produto => {
      modalBody.innerHTML += `
        <div class="d-flex justify-content-between mb-2">
          <span>${produto.nome}</span>
          <span>R$ ${produto.preco}</span>
          <button class="btn btn-danger btn-sm" onclick="removerDoCarrinho(${produto.id})">
            X
          </button>
        </div>
      `;
    });
  }

  const modal = new bootstrap.Modal(document.getElementById('modalCarrinho'));
  modal.show();
}

// Remover item
function removerDoCarrinho(id) {
  carrinho = carrinho.filter(p => p.id !== id);
  atualizarCarrinho();
  abrirCarrinho();
}

// Finalizar compra
function finalizarCompra() {
  alert("Compra finalizada!");
  carrinho = [];
  atualizarCarrinho();
}

// Buscar produtos
function buscarProdutos() {
  const termo = document.getElementById('buscar').value.toLowerCase();

  const filtrados = produtos.filter(p =>
    p.nome.toLowerCase().includes(termo)
  );

  const produtosDiv = document.getElementById('produtos');
  produtosDiv.innerHTML = '';

  filtrados.forEach(produto => {
    produtosDiv.innerHTML += `
      <div class="col-md-4">
        <div class="card">
          <img src="${produto.imagem}">
          <div class="card-body">
            <h5>${produto.nome}</h5>
            <p>R$ ${produto.preco}</p>
            <button class="btn btn-primary" onclick="adicionarAoCarrinho(${produto.id})">
              Comprar
            </button>
          </div>
        </div>
      </div>
    `;
  });
}

// Inicializar
gerarProdutos();
</script>

</body>
</html>
